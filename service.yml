apiVersion: v1
kind: Service
metadata:
  name: shivamwedding-service
spec:
  type: NodePort # or LoadBalancer
  selector:
    app: shivamwedding # Must match the label in your Deployment
  ports:
    - protocol: TCP
      port: 8000       # Port exposed by the service
      targetPort: 8000 # Port the container is listening on
      nodePort: 30080  # Optional: 
