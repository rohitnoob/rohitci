<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Shivam & Trupti</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f7f3ef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            /* Main elegant background photo of the couple */
            background: linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.4)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
        }

        /* Invitation Card Container */
        .invitation-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            max-width: 550px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            border: 2px solid #dfc79b;
            position: relative;
            overflow: hidden;
            animation: fadeIn 2s ease-in-out;
        }

        /* Decorative Borders */
        .invitation-card::before {
            content: '';
            position: absolute;
            top: 15px;
            bottom: 15px;
            left: 15px;
            right: 15px;
            border: 1px solid #dfc79b;
            border-radius: 15px;
            pointer-events: none;
        }

        /* Header Styles */
        .greeting {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #7a6e5d;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .invite-text {
            font-size: 1rem;
            color: #555;
            font-style: italic;
            margin-bottom: 25px;
        }

        /* Cartoon Avatar Section */
        .couple-cartoons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .avatar-box {
            text-align: center;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #dfc79b;
            background-color: #fff;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .heart-divider {
            font-size: 2rem;
            color: #d9534f;
            animation: pulse 1.5s infinite;
        }

        /* Couple Names */
        .couple-names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #8c6239;
            line-height: 1.2;
            margin-bottom: 25px;
        }

        .couple-names span {
            display: block;
            font-size: 2rem;
            font-family: 'Montserrat', sans-serif;
            color: #dfc79b;
            margin: 5px 0;
        }

        /* Details Section */
        .details {
            margin-top: 20px;
            border-top: 1px solid #dfc79b;
            border-bottom: 1px solid #dfc79b;
            padding: 20px 0;
        }

        .date {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .time {
            font-size: 1rem;
            color: #666;
            margin-bottom: 15px;
        }

        .venue-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7a6e5d;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .venue-details {
            font-size: 0.95rem;
            color: #444;
            line-height: 1.6;
        }

        /* Footer RSVD */
        .rsvp {
            margin-top: 25px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: #777;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .couple-names { font-size: 2.8rem; }
            .avatar { width: 80px; height: 80px; }
            .invitation-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="invitation-card">
        <p class="greeting">The Celebration of Love</p>
        <p class="invite-text">Together with their families, you are cordially invited to celebrate the wedding of</p>
        
        <div class="couple-cartoons">
            <div class="avatar-box">
                <img class="avatar" src="https://api.dicebear.com/9.x/toon-head/svg?seed=Sophia" alt="Shivam Cartoon">
            </div>
            
            <div class="heart-divider">♥</div>
            
            <div class="avatar-box">
                <img class="avatar" src="https://api.dicebear.com/9.x/toon-head/svg?seed=Andrea" alt="Trupti Cartoon">
            </div>
        </div>

        <h1 class="couple-names">
            Shivam 
            <span>&</span> 
            Trupti
        </h1>
        
        <div class="details">
            <p class="date">Tuesday, July 07, 2026</p>
            <p class="time">At 4:00 in the Afternoon</p>
            
            <p class="venue-title">Venue</p>
            <p class="venue-details">
                Desai House Kolvan,<br>
                Kolhapur, Maharashtra<br>
                
            </p>
        </div>
        
        <p class="rsvp">RSVP: Kindly respond by May 30, 2026</p>
    </div>

</body>
</html>
