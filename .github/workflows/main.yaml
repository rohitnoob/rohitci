name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t shivamwed:v1 .

      - name: Run container and verify app
        run: |
          docker run -d --name shivamwed -p 8000:8000 shivamwed:v1
          sleep 5
          curl --fail http://localhost:8000/
        shell: bash

      - name: Stop container
        if: always()
        run: |
          docker stop shivamwed:v1 || true
          docker rm shivamwed:v1 || true
        shell: bash

      - name: Docker image scan with Trivy
        uses: aquasecurity/trivy-action@v0.2.0
        with:
          image-ref: shivamwed:v1
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Push Docker image to Docker Hub
        run: |
          docker tag shivamwed:v1 ${{ secrets.DOCKER_USERNAME }}/shivamwed:v1
          docker push ${{ secrets.DOCKER_USERNAME }}/shivamwed:v1
