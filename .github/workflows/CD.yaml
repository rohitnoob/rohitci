name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      # ✅ Verify connection (VERY IMPORTANT)
      - name: Verify Kubernetes connection
        run: |
          export KUBECONFIG=$HOME/.kube/config
          kubectl get nodes

      - name: Deploy to Kubernetes
        run: |
          export KUBECONFIG=$HOME/.kube/config
          kubectl apply -f deploy.yml --validate=false
          kubectl apply -f service.yml --validate=false
          kubectl port-forward svc/shivamwedding-service --address 0.0.0.0 8000:8000

      - name: Restart Deployment
        run: |
          export KUBECONFIG=$HOME/.kube/config
          kubectl rollout restart deployment shivamwedding
